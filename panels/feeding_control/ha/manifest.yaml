# Integration-facing manifest for the feeding_control panel.
#
# Consumed by the thread_panel custom HA integration. Each entry here declares
# one HA entity to forward to the panel:
#
#   entity_id:  the full HA entity_id (domain.object_id) to mirror.
#   attributes: controls which of the entity's attributes are forwarded.
#       omit or []   forward state only, no attributes
#       [a, b, c]    forward only these named attribute keys
#       all          forward every attribute (use for entities whose attribute
#                    keys are dynamic, e.g. a schedule whose keys vary per item)
#
# Entity IDs below are placeholders — replace with the real PetLibro entity IDs
# in your Home Assistant install.

panel_id: feeding_control

entities:
  - entity_id: switch.pet_feeder
    attributes: []

  - entity_id: sensor.pet_feeder_schedule
    attributes: all

  - entity_id: sensor.pet_feeder_last_fed
    attributes:
      - timestamp
      - quantity
