name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # Skip checks that only matter for authors submitting to the HACS
          # default store. This repo is a personal custom integration,
          # installed by pointing HACS at chaddugas/thread_control_panel
          # directly — none of these affect install-time compatibility.
          ignore: brands description topics issues
