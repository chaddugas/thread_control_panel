## Platform component dependencies — shared across every thread_panel product.
##
## esp_ot_cli_extension intentionally omitted: it registers commands against
## OpenThread's CLI layer (via otCliSetUserCommands) but we don't expose a CLI
## on this device. Keeping CONFIG_OPENTHREAD_CLI=n drops ~30 KB of CLI code
## from the OT library and lets us run the console in non-blocking secondary
## mode (see sdkconfig.defaults "Console" block).
dependencies:
  idf:
    version: '>=4.1.0'
  ot_led:
    path: ${IDF_PATH}/examples/openthread/ot_common_components/ot_led
  ot_examples_common:
    path: ${IDF_PATH}/examples/openthread/ot_common_components/ot_examples_common
  espressif/mqtt: '*'
